<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Salim Dellali — Personal Site (UI Kit)</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="components.css">
  <style>
    /* Demo-only: prevent layout shift before fonts arrive */
    html, body { background: var(--bg); }
    /* Frame: 6px stripes on every viewport edge.
       Top is yellow→purple gradient (Stripe component), bottom too (footer stripe).
       Sides are solid: yellow left, purple right — so the four corners are
       color-matched and the page reads as a window inside a window. */
    :root { --frame: 6px; }
    body { padding: 0 var(--frame); }
    body::before, body::after {
      content: "";
      position: fixed;
      top: 0; bottom: 0;
      width: var(--frame);
      z-index: 100;
      pointer-events: none;
    }
    body::before { left: 0;  background: var(--sd-yellow); }
    body::after  { right: 0; background: var(--sd-purple); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
</body>
</html>
