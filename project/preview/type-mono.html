<!doctype html>
<html><head><meta charset="utf-8"><title>Type — mono & eyebrow</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="col" style="gap: var(--sp-4);">
    <div>
      <div class="label">Eyebrow · JetBrains Mono 500 · 12/16 · 0.08em caps</div>
      <div class="eyebrow" style="margin-top:6px;">FEATURED PROJECT · 2026</div>
    </div>
    <div>
      <div class="label">Inline code</div>
      <p style="margin:6px 0 0;">Run <code>pnpm install</code> then <code>pnpm dev</code> — the server starts on port <code>5173</code>.</p>
    </div>
    <div>
      <div class="label">Code (ligatures off — <code>===</code> stays as three equals)</div>
      <p style="margin:6px 0 0;font-family:var(--font-mono);font-size:14px;">
        <code style="background:none;border:0;padding:0;">if (count === 1 &amp;&amp; ok !== false) =&gt; "ok";</code>
      </p>
    </div>
    <div>
      <div class="label">Keyboard</div>
      <p style="margin:6px 0 0;">Press <kbd>⌘</kbd> + <kbd>K</kbd> to open the command palette.</p>
    </div>
  </div>
</body></html>
