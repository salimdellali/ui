<!doctype html>
<html><head><meta charset="utf-8"><title>Radii & shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="col" style="gap: var(--sp-4);">
    <div>
      <div class="label" style="margin-bottom:8px;">Radii — accentuated scale (0 → pill)</div>
      <div class="row" style="gap:14px;align-items:flex-end;">
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:0;"></div><div class="mono" style="margin-top:4px;font-size:11px;">none · 0</div></div>
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:2px;"></div><div class="mono" style="margin-top:4px;font-size:11px;">xs · 2</div></div>
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:4px;"></div><div class="mono" style="margin-top:4px;font-size:11px;">sm · 4</div></div>
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:8px;"></div><div class="mono" style="margin-top:4px;font-size:11px;">md · 8</div></div>
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:14px;"></div><div class="mono" style="margin-top:4px;font-size:11px;">lg · 14</div></div>
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:20px;"></div><div class="mono" style="margin-top:4px;font-size:11px;">xl · 20</div></div>
        <div style="text-align:center;"><div style="width:64px;height:56px;background:#ececef;border:1px solid var(--border);border-radius:9999px;"></div><div class="mono" style="margin-top:4px;font-size:11px;">pill</div></div>
      </div>
      <div class="label" style="margin-top:6px;line-height:1.5;font-size:11px;color:var(--fg-subtle);">Default <code style="font-family:var(--font-mono);">--r-md</code> is now 8px. Cards step up to <code style="font-family:var(--font-mono);">--r-lg</code> (14px) when they want more weight; modals & hero panels can use <code style="font-family:var(--font-mono);">--r-xl</code> (20px).</div>
    </div>
    <div>
      <div class="label" style="margin-bottom:8px;">Shadows</div>
      <div class="row" style="gap:14px;">
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:0 1px 0 0 rgba(10,10,10,.04);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;">xs</div>
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:0 1px 2px 0 rgba(10,10,10,.06),0 1px 1px -1px rgba(10,10,10,.04);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;">sm</div>
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:0 2px 4px -1px rgba(10,10,10,.08),0 4px 8px -2px rgba(10,10,10,.06);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;">md</div>
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:0 4px 8px -2px rgba(10,10,10,.10),0 12px 24px -6px rgba(10,10,10,.10);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;">lg</div>
        <div style="width:90px;height:60px;background:#fff;border-radius:8px;box-shadow:0 8px 16px -4px rgba(10,10,10,.12),0 24px 48px -12px rgba(10,10,10,.14);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;">xl</div>
      </div>
    </div>
  </div>
</body></html>
