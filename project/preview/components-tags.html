<!doctype html>
<html><head><meta charset="utf-8"><title>Tags & badges</title>
<link rel="stylesheet" href="_card.css">
<style>
.tag { display:inline-flex; align-items:center; font-family: var(--font-mono); font-size: 12px; padding: 3px 10px; border-radius: 9999px; }
.tag-neutral { background:#ececef; color:#2a2a30; }
.tag-outline { background:transparent; border:1px solid #d8d8de; color:#2a2a30; }
.tag-success { background:#e6f3ec; color:#1f5d36; }
.tag-warning { background:#fbf2d9; color:#7a5808; }
.tag-danger  { background:#f9e1dc; color:#7d2317; }
.tag-info    { background:#d9eef1; color:#125e68; }
.badge-dot { display:inline-flex; align-items:center; gap:6px; font-size:13px; }
.badge-dot::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--c, #3fa566); }
</style></head>
<body>
  <div class="col" style="gap:10px;">
    <div class="row"><span class="tag tag-neutral">typescript</span><span class="tag tag-outline">react</span><span class="tag tag-success">live</span><span class="tag tag-warning">draft</span><span class="tag tag-danger">archived</span><span class="tag tag-info">beta</span></div>
    <div class="row" style="gap:18px;"><span class="badge-dot" style="--c:#3fa566;">Online</span><span class="badge-dot" style="--c:#d49d12;">Idle</span><span class="badge-dot" style="--c:#a8311f;">Offline</span><span class="badge-dot" style="--c:#1a8997;">Building</span></div>
  </div>
</body></html>
