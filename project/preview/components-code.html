<!doctype html>
<html><head><meta charset="utf-8"><title>Code block</title>
<link rel="stylesheet" href="_card.css">
<style>
.code-card { border:1px solid #d8d8de; border-radius:3px; overflow:hidden; background:#fff; }
.code-head { display:flex; justify-content:space-between; padding: 8px 12px; background:#f5f5f7; border-bottom:1px solid #ececef; font-family: var(--font-mono); font-size: 12px; color:#6b6b75; }
.code-head .copy { cursor:pointer; }
pre { margin: 0; padding: 14px 16px; background:#0a0a0a; color:#f5f5f7; font-size: 13px; line-height: 1.55; overflow:auto; }
.tok-key { color: #f6c544; }
.tok-str { color: #5fc488; }
.tok-fn  { color: #4ecbd8; }
.tok-com { color: #6b6b75; font-style: italic; }
</style></head>
<body>
  <div class="code-card">
    <div class="code-head"><span>greet.ts</span><span class="copy">copy</span></div>
<pre><span class="tok-com">// say hello, plain and direct</span>
<span class="tok-key">export function</span> <span class="tok-fn">greet</span>(name: <span class="tok-key">string</span>) {
  <span class="tok-key">return</span> <span class="tok-str">`hi, ${name}.`</span>;
}</pre>
  </div>
</body></html>
