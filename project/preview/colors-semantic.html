<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 8px;">
    <div style="border:1px solid var(--border);border-radius:3px;padding:12px;background:#e6f3ec;color:#2a7d49;">
      <div class="mono" style="font-size:11px;opacity:.8;">SUCCESS</div>
      <div style="font-weight:600;margin-top:2px;">Saved successfully.</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:3px;padding:12px;background:#fbf2d9;color:#8a6510;">
      <div class="mono" style="font-size:11px;opacity:.8;">WARNING</div>
      <div style="font-weight:600;margin-top:2px;">Unsaved changes.</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:3px;padding:12px;background:#f9e1dc;color:#a8311f;">
      <div class="mono" style="font-size:11px;opacity:.8;">DANGER</div>
      <div style="font-weight:600;margin-top:2px;">Connection failed.</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:3px;padding:12px;background:#d9eef1;color:#1a8997;">
      <div class="mono" style="font-size:11px;opacity:.8;">INFO</div>
      <div style="font-weight:600;margin-top:2px;">3 updates available.</div>
    </div>
  </div>
  <div class="label" style="margin-top:10px;">Semantic surfaces map 1:1 to brand quartet — green→success, yellow→warning, red→danger, cyan→info.</div>
</body></html>
