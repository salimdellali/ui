name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5 # clones the repo into the runner, without this the job starts with an empty filesystem
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci # ci = clean install
      - run: npx tsc --noEmit # type checking
      - run: npx biome ci ./src # ci = continuous integration, format + lint but read-only, fails on violations
